<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register - SparkBlog')}"></head>
<body class="auth-page">

<header th:replace="~{layout :: header(null)}"></header>

<main class="container auth-container">
    <div class="auth-card glass-panel">
        <h2>Join SparkBlog</h2>
        <p>Create an account to start writing and engaging with the community.</p>
        
        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/register}" method="post" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a th:href="@{/login}">Log In</a></p>
    </div>
</main>

</body>
</html>
