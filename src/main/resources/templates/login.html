<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login - SparkBlog')}"></head>
<body class="auth-page">

<header th:replace="~{layout :: header(null)}"></header>

<main class="container auth-container">
    <div class="auth-card glass-panel">
        <h2>Welcome Back</h2>
        <p>Log in to continue sharing your stories.</p>
        
        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <p th:text="${success}"></p>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a th:href="@{/register}">Sign Up</a></p>
    </div>
</main>

</body>
</html>
